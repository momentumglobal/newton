# Deploys v2 branch to /v2/ subdirectory alongside the live site.
# Live site (main): https://<your-username>.github.io/<repo>/
# v2 preview (v2):  https://<your-username>.github.io/<repo>/v2/

name: Deploy v2 preview to Pages

on:
  push:
    branches: ["v2"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}v2/
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main (live site)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Checkout v2 into /v2/ subdirectory
        uses: actions/checkout@v4
        with:
          ref: v2
          path: v2

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
