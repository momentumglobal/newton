<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Newton</title>
  <link rel="icon" type="image/png" href="momentum-symbol.png">
  <style>
    @font-face {
      font-family: 'Polymath';
      src: url('polymath-regular.ttf') format('truetype');
      font-weight: 400;
    }
    @font-face {
      font-family: 'Polymath';
      src: url('polymath-semibold.ttf') format('truetype');
      font-weight: 600;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Polymath', 'Segoe UI', Arial, sans-serif;
      background: #090546;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    /* Watermark */
    #watermark {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 120vmin; height: 120vmin;
      opacity: 0.25;
      pointer-events: none;
      z-index: 0;
    }
    /* Logo bottom left */
    .home-logo {
      position: fixed;
      bottom: 32px;
      left: 32px;
      height: 36px;
      width: auto;
      z-index: 2;
      opacity: 0.7;
    }
    /* Sign out */
    .home-signout {
      position: fixed;
      bottom: 36px;
      right: 32px;
      font-family: 'Polymath', 'Segoe UI', Arial, sans-serif;
      font-size: 13px;
      color: rgba(255,255,255,0.35);
      background: none;
      border: none;
      cursor: pointer;
      z-index: 2;
    }
    .home-signout:hover { color: rgba(255,255,255,0.7); }
    /* Centre content */
    .home-center {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }
    .home-greeting {
      font-size: 13px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.03em;
      margin-bottom: 6px;
    }
    .home-title {
      font-size: 28px;
      font-weight: 600;
      color: white;
      margin-bottom: 6px;
    }
    .home-subtitle {
      font-size: 11px;
      color: rgba(255,255,255,0.28);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 48px;
    }
    /* Module grid */
    .module-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      width: 440px;
    }
    .module-grid.single {
      grid-template-columns: 1fr;
      width: 220px;
    }
    .module-card {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 12px;
      padding: 24px 20px;
      cursor: pointer;
      text-align: left;
      text-decoration: none;
      display: block;
      transition: background 0.15s, border-color 0.15s;
    }
    .module-card:hover {
      background: rgba(255,255,255,0.21);
      border-color: rgba(255,255,255,0.32);
    }
    .module-card.disabled {
      opacity: 0.45;
      cursor: default;
      pointer-events: none;
    }
    .module-icon {
      width: 24px;
      height: 24px;
      margin-bottom: 12px;
      display: block;
      color: rgba(255,255,255,0.75);
      stroke-width: 1.5;
   }
    .module-name {
      font-size: 15px;
      font-weight: 600;
      color: white;
      margin-bottom: 4px;
    }
    .module-desc {
      font-size: 12px;
      color: rgba(255,255,255,0.48);
      line-height: 1.45;
    }
    .module-badge {
      display: inline-block;
      margin-top: 10px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 10px;
    }
    .badge-live {
      background: rgba(46,95,163,0.55);
      color: rgba(255,255,255,0.85);
    }
    .badge-soon {
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.38);
    }
  </style>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

  <!-- Watermark -->
  <img id="watermark" src="mg-visual-swirl.png" alt="">

  <!-- Logo -->
  <img class="home-logo" src="momentum-symbol-and-name-global-white.png" alt="Momentum Global">

  <!-- Sign out -->
  <button class="home-signout" onclick="handleSignOut()">Sign out</button>

  <!-- Centre content -->
  <div class="home-center">
    <div class="home-greeting" id="home-greeting">Welcome back</div>
    <div class="home-title">Newton</div>
    <div class="home-subtitle">Momentum Global &nbsp;·&nbsp; Operating System</div>
    <div class="module-grid" id="module-grid"></div>
  </div>

  <!-- MSAL -->
  <script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.3/lib/msal-browser.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>

  <script>
    // ── Module definitions ─────────────────────────────────────────────
    const ALL_MODULES = [
      {
        key: 'reporting',
        name: 'Reporting',
        desc: 'Pipeline analytics & Solutions Hub reporting',
        icon: 'bar-chart-2',
        href: 'index.html',
        live: true,
        roles: ['admin', 'delivery_manager', 'talent_partner', 'leadership'],
      },
      {
        key: 'people',
        name: 'People',
        desc: 'Onboarding, headcount & workforce planning',
        icon: 'users',
        href: null,
        live: false,
        roles: ['admin', 'leadership'],
      },
      {
        key: 'finance',
        name: 'Finance',
        desc: 'Budget tracking, spend & cost reporting',
        icon: 'pound-sterling',
        href: null,
        live: false,
        roles: ['admin', 'leadership'],
      },
      {
        key: 'operations',
        name: 'Operations',
        desc: 'Process management & operational data',
        icon: 'settings-2',
        href: null,
        live: false,
        roles: ['admin', 'leadership'],
      },
    ];

    // ── Render ─────────────────────────────────────────────────────────
    async function initHome() {
      // Handle MSAL redirect first
      await msalInstance.handleRedirectPromise();

      if (!isSignedIn()) {
        window.location.href = 'index.html';
        return;
      }

      const user = getCurrentUser();
      const firstName = (user.name || user.email || '').split(' ')[0];
      document.getElementById('home-greeting').textContent = `Welcome back, ${firstName}`;

      // Resolve role
      const role = await getUserRoleAsync(user.email);

      // Filter modules by role
      const visible = ALL_MODULES.filter(m => m.roles.includes(role));

      const grid = document.getElementById('module-grid');
      if (visible.length === 1) grid.classList.add('single');

      grid.innerHTML = visible.map(m => `
  <${m.live ? `a href="${m.href}"` : 'div'} class="module-card${m.live ? '' : ' disabled'}">
    <i data-lucide="${m.icon}" class="module-icon"></i>
    <div class="module-name">${m.name}</div>
    <div class="module-desc">${m.desc}</div>
    <span class="module-badge ${m.live ? 'badge-live' : 'badge-soon'}">${m.live ? 'Live' : 'Coming soon'}</span>
  </${m.live ? 'a' : 'div'}>
`).join('');
lucide.createIcons();
    }

    function handleSignOut() {
      signOut();
    }

    initHome();
  </script>
</body>
</html>
