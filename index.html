function ccBadgeHTML(rag, label) {
  return `<span class="cc-badge cc-badge--${rag}">${label}</span>`;
}

async function refreshCCBanner() {
  const [roles, acts4, acts13, forecasts, assigns, people] = await Promise.all([
    getAllRoles(),
    getActivityForAnalytics(4),
    getActivityForAnalytics(13),
    getItems('SalesForecasts'),
    getItems('Assignments'),
    getPeople(false)
  ]);
  
  // Project Health RAG
  const open = roles.filter(r => !ACTIVE_STAGES.includes(r.Stage));
  const flagged = open.filter(role => {
    const acts = acts4.filter(a => String(a.RoleIDLookupId) === String(role.id));
    return isRoleFlagged(role, acts);
  }).length;
  const healthPct = open.length ? flagged / open.length : 0;
  const ragHealth = healthPct < 0.25 ? 'green' : healthPct <= 0.50 ? 'amber' : 'red';

  // People RAG — weighted score across TPs by flagged role ratio
  const tps = [...new Set(open.filter(r => r.TalentPartner).map(r => r.TalentPartner))];
  const weight = { green: 0, amber: 1, red: 2, grey: 0 };
  const peopleScore = tps.length ? tps.reduce((sum, tp) => {
    const tpRoles  = open.filter(r => r.TalentPartner && r.TalentPartner.toLowerCase() === tp.toLowerCase());
    const flaggedTP = tpRoles.filter(r => {
      const acts = acts13.filter(a => String(a.RoleIDLookupId) === String(r.id));
      return isRoleFlagged(r, acts);
    }).length;
    const pct = tpRoles.length ? flaggedTP / tpRoles.length : null;
    const rag = pct === null ? 'grey' : pct < 0.25 ? 'green' : pct <= 0.50 ? 'amber' : 'red';
    return sum + weight[rag];
  }, 0) / tps.length : 0;
  const ragPeople = peopleScore < 0.5 ? 'green' : peopleScore <= 1.0 ? 'amber' : 'red';

  // Utilisation RAG — forecast over next 13 weeks
  const t = CONFIG.UTILISATION_THRESHOLDS;
  const now = new Date();
  const horizon = new Date(now.getTime() + 91 * 86400000);
  const totalActiveHeadcount = people.filter(p => p.IsActive !== false && ['SDM','STP','TP'].includes(p.Level)).length;
  const known13 = assigns.filter(a => {
    if (!a.StartDate || !a.EndDate) return false;
    const s = new Date(a.StartDate); const e = new Date(a.EndDate);
    return s <= horizon && e >= now && a.Level !== 'CSD';
  });
  const totalCap  = known13.reduce((s, a) => s + (a.MonthlyCapacity || 1), 0);
  const billedCap = known13.filter(a => a.Billed === 'Yes').reduce((s, a) => s + (a.MonthlyCapacity || 1), 0);
  const knownUtil = totalCap > 0 ? billedCap / totalCap : 0;
  const forecastedHC = forecasts.reduce((sum, f) => {
    const s = new Date(f.ForecastStartDate); const e = new Date(f.ForecastEndDate);
    return (s <= horizon && e >= now) ? sum + (f.ForecastedHeadcount || 0) : sum;
  }, 0);
  const forecastUtil = Math.min(knownUtil + (totalActiveHeadcount > 0 ? forecastedHC / totalActiveHeadcount : 0), 1.0);
  const ragUtil = forecastUtil >= t.green ? 'green' : forecastUtil >= t.amber ? 'amber' : 'red';

  // Write to CCStatus SP list
  const statuses = [
    { title: 'health', rag: ragHealth },
    { title: 'people', rag: ragPeople },
    { title: 'util',   rag: ragUtil   },
  ];
  const existing = await getItems('CCStatus');
  for (const s of statuses) {
    const match = existing.find(e => e.Title === s.title);
    if (match) { await updateItem('CCStatus', match.id, { RAG: s.rag }); }
    else        { await createItem('CCStatus', { Title: s.title, RAG: s.rag }); }
  }

  renderCCBadges(ragHealth, ragPeople, ragUtil);
}

function renderCCBadges(health, people, util) {
  const el = document.getElementById('cc-banner-slot');
  if (!el) return;
  el.innerHTML = `
    <a href="command-centre.html" class="cc-home-banner">
      <div class="cc-home-banner__top">
        <div class="cc-home-banner__title">Command Centre</div>
        <button class="cc-refresh" title="Refresh" onclick="event.preventDefault(); refreshCCBanner()">↻</button>
      </div>
      <div class="cc-home-banner__sub">Executive Operations View</div>
      <div class="cc-home-banner__badges">
        ${ccBadgeHTML(health, 'Projects')}
        ${ccBadgeHTML(people, 'People')}
        ${ccBadgeHTML(util,   'Utilisation')}
      </div>
    </a>`;
}

async function renderCommandCentreBanner(role) {
  if (role !== 'admin' && role !== 'leadership') return;

  // Show last-known state from SP immediately
  const existing = await getItems('CCStatus');
  if (existing.length) {
    const get = key => (existing.find(e => e.Title === key) || {}).RAG || 'neutral';
    renderCCBadges(get('health'), get('people'), get('util'));
  } else {
    renderCCBadges('neutral', 'neutral', 'neutral');
  }
}
    
    async function initHome() {
      const response = await msalInstance.handleRedirectPromise();
      if (response) {
        const account = response.account || msalInstance.getAllAccounts()[0];
        if (account) {

          localStorage.setItem('userName', account.name);

      document.getElementById('home-greeting').textContent = `Welcome back, ${firstName}`;
      const role = await getUserRoleAsync(user.email);
      const visible = ALL_MODULES.filter(m => m.roles.includes(role));
      const grid = document.getElementById('module-grid');
      if (visible.length === 1) grid.classList.add('single');

          <div class="module-name">${m.name}</div>
          <div class="module-desc">${m.desc}</div>
          <span class="module-badge ${m.live ? 'badge-live' : 'badge-soon'}">${m.live ? 'Live' : 'Coming soon'}</span>

      lucide.createIcons();
      if (role === 'admin') {
        const adminLink = document.getElementById('admin-link');
        if (adminLink) adminLink.style.display = 'block';

      // NEW: CC banner for Admin/Leadership
      await renderCommandCentreBanner(role);
      initGhostBanner();

      // Load announcement banner

<canvas id="fx-canvas" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1;display:none">
<script>
(function() {
  const canvas = document.getElementById('fx-canvas');
  const ctx    = canvas.getContext('2d');
  let animFrame   = null;
  let activeEffect = null;
  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  function stopAll() {
    if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    canvas.style.display = 'none';
    activeEffect = null;
  }
  // ── Snow ──────────────────────────────────────────────────────────
  function startSnow() {
    stopAll(); activeEffect = 'snow';
    canvas.style.display = 'block'; resize();
    const flakes = [];
    const count = Math.floor((canvas.width * canvas.height) / 18000);
    for (let i = 0; i < count; i++) {
      flakes.push({
        x: Math.random() * canvas.width, y: Math.random() * canvas.height,
        r: Math.random() * 2 + 1, speed: Math.random() * 0.6 + 0.3,
        drift: (Math.random() - 0.5) * 0.3, alpha: Math.random() * 0.5 + 0.3,
      });
    }
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      flakes.forEach(f => {
        ctx.beginPath(); ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${f.alpha})`; ctx.fill();
        f.y += f.speed; f.x += f.drift;
        if (f.y > canvas.height) { f.y = -f.r; f.x = Math.random() * canvas.width; }
        if (f.x > canvas.width) f.x = 0;
        if (f.x < 0) f.x = canvas.width;
      });
      animFrame = requestAnimationFrame(draw);
    }
    draw();
  }
  // ── Christmas Lights ──────────────────────────────────────────────
  function startLights() {
    stopAll(); activeEffect = 'lights';
    canvas.style.display = 'block'; resize();
    const COLOURS = ['#ff3b3b','#ffcc00','#33cc55','#3399ff','#ff66cc','#ff9900'];
    const count = Math.floor(canvas.width / 60);
    const bulbs = [];
    const sagDepth = 28;
    for (let i = 0; i < count; i++) {
      const t = i / (count - 1);
      bulbs.push({
        x: t * canvas.width, y: 18 + Math.sin(Math.PI * t) * sagDepth,
        colour: COLOURS[i % COLOURS.length],
        phase: Math.random() * Math.PI * 2,
        speed: 0.015 + Math.random() * 0.01,
      });
    }
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.beginPath(); ctx.moveTo(0, 18);
      for (let i = 1; i <= count; i++) {
        const t = i / count;
        ctx.lineTo(t * canvas.width, 18 + Math.sin(Math.PI * (i - 0.5) / count) * sagDepth);
      }
      ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = 1.5; ctx.stroke();
      bulbs.forEach(b => {
        b.phase += b.speed;
        const glow = 0.55 + Math.sin(b.phase) * 0.45;
        const r = 6;
        const grad = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, r * 3);
        grad.addColorStop(0, b.colour + 'ff');
        grad.addColorStop(0.4, b.colour + Math.round(glow * 180).toString(16).padStart(2,'0'));
        grad.addColorStop(1, b.colour + '00');
        ctx.beginPath(); ctx.arc(b.x, b.y, r * 3, 0, Math.PI * 2);
        ctx.fillStyle = grad; ctx.fill();
        ctx.beginPath(); ctx.arc(b.x, b.y, r, 0, Math.PI * 2);
        ctx.fillStyle = b.colour; ctx.globalAlpha = glow; ctx.fill(); ctx.globalAlpha = 1;
      });
      animFrame = requestAnimationFrame(draw);
    }
    draw();
  }
  // ── Summer ────────────────────────────────────────────────────────
  function startSummer() {
    stopAll(); activeEffect = 'summer';
    canvas.style.display = 'block'; resize();
    let tick = 0;
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const w = canvas.width, h = canvas.height;
      const sx = w - 80, sy = 80;
      const sunGrad = ctx.createRadialGradient(sx, sy, 10, sx, sy, 140);
      sunGrad.addColorStop(0,   'rgba(255,240,100,0.95)');
      sunGrad.addColorStop(0.2, 'rgba(255,200,50,0.5)');
      sunGrad.addColorStop(0.6, 'rgba(255,160,20,0.15)');
      sunGrad.addColorStop(1,   'rgba(255,140,0,0)');
      ctx.beginPath(); ctx.arc(sx, sy, 140, 0, Math.PI * 2);
      ctx.fillStyle = sunGrad; ctx.fill();
      ctx.beginPath(); ctx.arc(sx, sy, 28, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,240,100,0.95)'; ctx.fill();
      const beachTop = h - 90;
      const beachGrad = ctx.createLinearGradient(0, beachTop, 0, h);
      beachGrad.addColorStop(0, 'rgba(210,180,120,0.82)');
      beachGrad.addColorStop(1, 'rgba(190,155,90,0.92)');
      ctx.fillStyle = beachGrad; ctx.fillRect(0, beachTop, w, 90);
      [0, 1].forEach(layer => {
        const offset = Math.sin(tick * 0.018 + layer * Math.PI) * 6;
        const waveY  = beachTop - 14 + layer * 8 + offset;
        ctx.beginPath(); ctx.moveTo(0, waveY);
        for (let x = 0; x <= w; x += 4) {
          ctx.lineTo(x, waveY + Math.sin((x / w) * Math.PI * 6 + tick * 0.04 + layer * 1.2) * 4);
        }
        ctx.lineTo(w, h); ctx.lineTo(0, h); ctx.closePath();
        ctx.fillStyle = layer === 0 ? 'rgba(80,180,210,0.22)' : 'rgba(100,200,230,0.14)';
        ctx.fill();
      });
      tick++;
      animFrame = requestAnimationFrame(draw);
    }
    draw();
  }
  // ── Spring ────────────────────────────────────────────────────────
  function startSpring() {
    stopAll(); activeEffect = 'spring';
    canvas.style.display = 'block'; resize();
    let tick = 0;
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const w = canvas.width, h = canvas.height;
      const grassTop = h - 70;
      const grassGrad = ctx.createLinearGradient(0, grassTop, 0, h);
      grassGrad.addColorStop(0, 'rgba(80,160,60,0.85)');
      grassGrad.addColorStop(1, 'rgba(50,120,30,0.95)');
      ctx.fillStyle = grassGrad; ctx.fillRect(0, grassTop, w, 70);
      const bladeCount = Math.floor(w / 8);
      for (let i = 0; i < bladeCount; i++) {
        const x    = (i / bladeCount) * w;
        const sway = Math.sin(tick * 0.025 + i * 0.4) * 3;
        const bh   = 14 + Math.sin(i * 1.7) * 6;
        ctx.beginPath();
        ctx.moveTo(x, grassTop);
        ctx.quadraticCurveTo(x + sway, grassTop - bh * 0.5, x + sway * 1.5, grassTop - bh);
        ctx.strokeStyle = 'rgba(60,140,40,0.7)'; ctx.lineWidth = 1.2; ctx.stroke();
      }
      const flowerPositions = [0.08,0.17,0.26,0.35,0.44,0.53,0.62,0.71,0.80,0.89];
      const petalColours    = ['#ff9eb5','#ffda79','#c9a0ff','#ff9eb5','#79e0ff','#ffda79','#c9a0ff','#ff9eb5','#79e0ff','#ffda79'];
      flowerPositions.forEach((t, fi) => {
        const x    = t * w;
        const y    = grassTop - 4;
        const sway = Math.sin(tick * 0.025 + fi * 0.9) * 2;
        ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x + sway, y - 18);
        ctx.strokeStyle = 'rgba(60,140,40,0.8)'; ctx.lineWidth = 1.5; ctx.stroke();
        for (let p = 0; p < 5; p++) {
          const angle = (p / 5) * Math.PI * 2;
          ctx.beginPath();
          ctx.arc(x + sway + Math.cos(angle) * 5, y - 18 + Math.sin(angle) * 5, 3.5, 0, Math.PI * 2);
          ctx.fillStyle = petalColours[fi % petalColours.length];
          ctx.globalAlpha = 0.85; ctx.fill(); ctx.globalAlpha = 1;
        }
        ctx.beginPath(); ctx.arc(x + sway, y - 18, 2.5, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,220,50,0.95)'; ctx.fill();
      });
      tick++;
      animFrame = requestAnimationFrame(draw);
    }
    draw();
  }
  // ── Autumn ────────────────────────────────────────────────────────
  function startAutumn() {
    stopAll(); activeEffect = 'autumn';
    canvas.style.display = 'block'; resize();
    const LEAF_COLOURS = ['#cc4400','#dd6600','#ee8800','#bb3300','#ffaa00','#993300'];
    const leaves = [];
    const count  = Math.floor((canvas.width * canvas.height) / 14000);
    for (let i = 0; i < count; i++) {
      leaves.push({
        x: Math.random() * canvas.width, y: Math.random() * canvas.height,
        size: Math.random() * 7 + 5, speed: Math.random() * 0.8 + 0.3,
        drift: (Math.random() - 0.5) * 0.6, spin: (Math.random() - 0.5) * 0.04,
        angle: Math.random() * Math.PI * 2,
        colour: LEAF_COLOURS[Math.floor(Math.random() * LEAF_COLOURS.length)],
        alpha: Math.random() * 0.5 + 0.4, wobble: Math.random() * Math.PI * 2,
      });
    }
    function drawLeaf(x, y, size, angle, colour, alpha) {
      ctx.save(); ctx.translate(x, y); ctx.rotate(angle); ctx.globalAlpha = alpha;
      ctx.beginPath();
      ctx.moveTo(0, -size);
      ctx.bezierCurveTo(size * 0.8, -size * 0.5, size * 0.8, size * 0.5, 0, size * 0.3);
      ctx.bezierCurveTo(-size * 0.8, size * 0.5, -size * 0.8, -size * 0.5, 0, -size);
      ctx.fillStyle = colour; ctx.fill();
      ctx.beginPath(); ctx.moveTo(0, -size); ctx.lineTo(0, size * 0.3);
      ctx.strokeStyle = 'rgba(0,0,0,0.15)'; ctx.lineWidth = 0.8; ctx.stroke();
      ctx.globalAlpha = 1; ctx.restore();
    }
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      leaves.forEach(l => {
        l.wobble += 0.02; l.y += l.speed;
        l.x += l.drift + Math.sin(l.wobble) * 0.4; l.angle += l.spin;
        if (l.y > canvas.height + l.size) { l.y = -l.size; l.x = Math.random() * canvas.width; }
        if (l.x > canvas.width + l.size) l.x = -l.size;
        if (l.x < -l.size) l.x = canvas.width + l.size;
        drawLeaf(l.x, l.y, l.size, l.angle, l.colour, l.alpha);
      });
      animFrame = requestAnimationFrame(draw);
    }
    draw();
  }
  // ── Public API ────────────────────────────────────────────────────
  window.fxStop   = stopAll;
  window.fxSnow   = startSnow;
  window.fxLights = startLights;
  window.fxSummer = startSummer;
  window.fxSpring = startSpring;
  window.fxAutumn = startAutumn;
  window.addEventListener('resize', () => { if (activeEffect) resize(); });
// Load seasonal effect from SharePoint on page load
  getSeasonalEffect().then(saved => {
    if (saved === 'snow')   startSnow();
    if (saved === 'lights') startLights();
    if (saved === 'summer') startSummer();
    if (saved === 'spring') startSpring();
    if (saved === 'autumn') startAutumn();
  });
})();
</script>
