<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Newton</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" href="momentum-symbol.png">
</head>
<body>

  <!-- Login screen -->
  <div id="login-screen">
    <div class="login-card">
      <h1>Newton</h1>
      <p>Sign in with your Momentum Global account to continue.</p>
      <button class="btn-signin" onclick="signIn()">
        Sign in with Microsoft
      </button>
    </div>
    <img src="momentum-symbol-and-name-global.png" alt="Momentum Global" class="login-logo">
  </div>

  <!-- App shell (hidden until signed in) -->
  <div id="app-shell">
    <div id="sidebar"></div>
    <div id="main-content"></div>
  </div>

  <!-- MSAL.js from Microsoft CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.3/lib/msal-browser.min.js"></script>

<!-- App scripts — load in this order -->
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/router.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/api.js"></script>
  <script src="js/forms.js"></script>
  <script src="js/pages.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/admin.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
