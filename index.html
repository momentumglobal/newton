<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Newton - Home</title>
  <link rel="icon" type="image/png" href="momentum-symbol.png">
  <style>
    @font-face {
      font-family: 'Polymath';
      src: url('polymath-regular.ttf') format('truetype');
      font-weight: 400;
    }
    @font-face {
      font-family: 'Polymath';
      src: url('polymath-semibold.ttf') format('truetype');
      font-weight: 600;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Polymath', 'Segoe UI', Arial, sans-serif;
      background: #090546;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    /* Watermark */
    #watermark {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 120vmin; height: 120vmin;
      opacity: 0.25;
      pointer-events: none;
      z-index: 0;
    }
    /* Logo bottom left */
    .home-logo {
      position: fixed;
      bottom: 32px;
      left: 32px;
      height: 36px;
      width: auto;
      z-index: 2;
      opacity: 0.7;
    }
    /* Sign out */
    .home-signout {
      position: fixed;
      bottom: 36px;
      right: 32px;
      font-family: 'Polymath', 'Segoe UI', Arial, sans-serif;
      font-size: 13px;
      color: rgba(255,255,255,0.35);
      background: none;
      border: none;
      cursor: pointer;
      z-index: 2;
    }
    .home-signout:hover { color: rgba(255,255,255,0.7); }
    /* Centre content */
    .home-center {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }
    .home-greeting {
      font-size: 13px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.03em;
      margin-bottom: 6px;
    }
    .home-title {
      font-size: 28px;
      font-weight: 600;
      color: white;
      margin-bottom: 6px;
    }
    .home-subtitle {
      font-size: 11px;
      color: rgba(255,255,255,0.28);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 48px;
    }
    /* Module grid */
    .module-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      width: 440px;
    }
    .module-grid.single {
      grid-template-columns: 1fr;
      width: 220px;
    }
    .module-card {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 12px;
      padding: 24px 20px;
      cursor: pointer;
      text-align: left;
      text-decoration: none;
      display: block;
      transition: background 0.15s, border-color 0.15s;
    }
    .module-card:hover {
      background: rgba(255,255,255,0.21);
      border-color: rgba(255,255,255,0.32);
    }
    .module-card.disabled {
      opacity: 0.45;
      cursor: default;
      pointer-events: none;
    }
    .module-icon {
      width: 24px;
      height: 24px;
      margin-bottom: 12px;
      display: block;
      color: rgba(255,255,255,0.75);
      stroke-width: 1.5;
   }
    .module-name {
      font-size: 15px;
      font-weight: 600;
      color: white;
      margin-bottom: 4px;
    }
    .module-desc {
      font-size: 12px;
      color: rgba(255,255,255,0.48);
      line-height: 1.45;
    }
    .module-badge {
      display: inline-block;
      margin-top: 10px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 10px;
    }
    .badge-live {
      background: rgba(46,95,163,0.55);
      color: rgba(255,255,255,0.85);
    }
    .badge-soon {
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.38);
    }
  </style>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

  <!-- Watermark -->
  <img id="watermark" src="mg-visual-swirl.png" alt="">

  <!-- Logo -->
  <img class="home-logo" src="momentum-symbol-and-name-global-white.png" alt="Momentum Global">
 
  <!-- Admin link -->
<a id="admin-link" href="admin.html" style="display:none;position:fixed;bottom:36px;right:100px;font-family:'Polymath','Segoe UI',Arial,sans-serif;font-size:13px;color:rgba(255,255,255,0.35);text-decoration:none;z-index:2;">Admin</a>
  
  <!-- Sign out -->
  <button class="home-signout" onclick="handleSignOut()">Sign out</button>

  <!-- Centre content -->
  <div class="home-center">
    <div class="home-greeting" id="home-greeting">Welcome back</div>
    <div class="home-title">Newton</div>
    <div class="home-subtitle">Momentum Global &nbsp;·&nbsp; Operating System</div>
    <div class="module-grid" id="module-grid"></div>
  </div>

  <!-- MSAL -->
  <script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.3/lib/msal-browser.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>

  <script>
    // ── Module definitions ─────────────────────────────────────────────
    const ALL_MODULES = [
      {
        key: 'reporting',
        name: 'Reporting',
        desc: 'Solutions Hub reporting & Pipeline analytics',
        icon: 'bar-chart-2',
        href: 'reporting.html',
        live: true,
        roles: ['admin', 'delivery_manager', 'talent_partner', 'leadership'],
      },
      {
        key: 'people',
        name: 'People',
        desc: 'Headcount, Utilisation & Workforce Planning',
        icon: 'users',
        href: 'people.html',
        live: true,
        roles: ['admin', 'leadership'],
      },
      {
        key: 'finance',
        name: 'Finance',
        desc: 'Budget tracking, spend & cost reporting',
        icon: 'pound-sterling',
        href: null,
        live: false,
        roles: ['admin', 'leadership'],
      },
      {
        key: 'operations',
        name: 'Operations',
        desc: 'Process management & operational data',
        icon: 'settings-2',
        href: null,
        live: false,
        roles: ['admin', 'leadership'],
      },
    ];

    // ── Render ─────────────────────────────────────────────────────────
    async function initHome() {
  // Handle MSAL redirect — store user details if coming back from Microsoft login
  const response = await msalInstance.handleRedirectPromise();
  if (response) {
    const account = response.account || msalInstance.getAllAccounts()[0];
    if (account) {
      localStorage.setItem('userEmail', account.username.toLowerCase());
      localStorage.setItem('userName', account.name);
    }
  }

  if (!isSignedIn()) {
    window.location.href = 'reporting.html';
    return;
  }

  const user = getCurrentUser();
  const firstName = (user.name || user.email || '').split(' ')[0];
  document.getElementById('home-greeting').textContent = `Welcome back, ${firstName}`;

  const role = await getUserRoleAsync(user.email);
  const visible = ALL_MODULES.filter(m => m.roles.includes(role));
  const grid = document.getElementById('module-grid');
  if (visible.length === 1) grid.classList.add('single');
  grid.innerHTML = visible.map(m => `
    <${m.live ? `a href="${m.href}"` : 'div'} class="module-card${m.live ? '' : ' disabled'}">
      <i data-lucide="${m.icon}" class="module-icon"></i>
      <div class="module-name">${m.name}</div>
      <div class="module-desc">${m.desc}</div>
      <span class="module-badge ${m.live ? 'badge-live' : 'badge-soon'}">${m.live ? 'Live' : 'Coming soon'}</span>
    </${m.live ? 'a' : 'div'}>
  `).join('');
  lucide.createIcons();
  // Show Admin link if user is admin
  if (role === 'admin') {
    const adminLink = document.getElementById('admin-link');
    if (adminLink) adminLink.style.display = 'block';
  }
}
    function handleSignOut() {
      signOut();
    }

    initHome();
  </script>
<canvas id="fx-canvas" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1;display:none"></canvas>
<script>
(function() {
  const canvas  = document.getElementById('fx-canvas');
  const ctx     = canvas.getContext('2d');
  let animFrame = null;
  let activeEffect = null;

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  function stopAll() {
    if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    canvas.style.display = 'none';
    activeEffect = null;
  }

  // ── Snow ──────────────────────────────────────────────────────────
  function startSnow() {
    stopAll();
    activeEffect = 'snow';
    canvas.style.display = 'block';
    resize();
    const flakes = [];
    const count = Math.floor((canvas.width * canvas.height) / 18000);
    for (let i = 0; i < count; i++) {
      flakes.push({
        x: Math.random() * canvas.width, y: Math.random() * canvas.height,
        r: Math.random() * 2 + 1, speed: Math.random() * 0.6 + 0.3,
        drift: (Math.random() - 0.5) * 0.3, alpha: Math.random() * 0.5 + 0.3,
      });
    }
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      flakes.forEach(f => {
        ctx.beginPath();
        ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${f.alpha})`;
        ctx.fill();
        f.y += f.speed; f.x += f.drift;
        if (f.y > canvas.height) { f.y = -f.r; f.x = Math.random() * canvas.width; }
        if (f.x > canvas.width) f.x = 0;
        if (f.x < 0) f.x = canvas.width;
      });
      animFrame = requestAnimationFrame(draw);
    }
    draw();
  }

  // ── Christmas Lights ──────────────────────────────────────────────
  function startLights() {
    stopAll();
    activeEffect = 'lights';
    canvas.style.display = 'block';
    resize();
    const COLOURS = ['#ff3b3b','#ffcc00','#33cc55','#3399ff','#ff66cc','#ff9900'];
    const count   = Math.floor(canvas.width / 60);
    const bulbs   = [];
    const sagDepth = 28;
    for (let i = 0; i < count; i++) {
      const t = i / (count - 1);
      const sag = Math.sin(Math.PI * t) * sagDepth;
      bulbs.push({
        x:      t * canvas.width,
        y:      18 + sag,
        colour: COLOURS[i % COLOURS.length],
        phase:  Math.random() * Math.PI * 2,
        speed:  0.015 + Math.random() * 0.01,
      });
    }
    let tick = 0;
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      // Wire
      ctx.beginPath();
      ctx.moveTo(0, 18);
      for (let i = 1; i <= count; i++) {
        const t = i / count;
        const sag = Math.sin(Math.PI * (i - 0.5) / count) * sagDepth;
        ctx.lineTo(t * canvas.width, 18 + sag);
      }
      ctx.strokeStyle = 'rgba(255,255,255,0.25)';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      // Bulbs
      bulbs.forEach(b => {
        b.phase += b.speed;
        const glow  = 0.55 + Math.sin(b.phase) * 0.45;
        const r     = 6;
        const grad  = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, r * 3);
        grad.addColorStop(0,   b.colour + 'ff');
        grad.addColorStop(0.4, b.colour + Math.round(glow * 180).toString(16).padStart(2,'0'));
        grad.addColorStop(1,   b.colour + '00');
        ctx.beginPath();
        ctx.arc(b.x, b.y, r * 3, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.fill();
        ctx.beginPath();
        ctx.arc(b.x, b.y, r, 0, Math.PI * 2);
        ctx.fillStyle = b.colour;
        ctx.globalAlpha = glow;
        ctx.fill();
        ctx.globalAlpha = 1;
      });
      tick++;
      animFrame = requestAnimationFrame(draw);
    }
    draw();
  }

  // ── Summer ────────────────────────────────────────────────────────
  function startSummer() {
    stopAll();
    activeEffect = 'summer';
    canvas.style.display = 'block';
    resize();
    let tick = 0;
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const w = canvas.width, h = canvas.height;

      // Sun glow (top right)
      const sx = w - 80, sy = 80;
      const sunGrad = ctx.createRadialGradient(sx, sy, 10, sx, sy, 140);
      sunGrad.addColorStop(0,   'rgba(255,240,100,0.95)');
      sunGrad.addColorStop(0.2, 'rgba(255,200,50,0.5)');
      sunGrad.addColorStop(0.6, 'rgba(255,160,20,0.15)');
      sunGrad.addColorStop(1,   'rgba(255,140,0,0)');
      ctx.beginPath();
      ctx.arc(sx, sy, 140, 0, Math.PI * 2);
      ctx.fillStyle = sunGrad;
      ctx.fill();
      // Sun disc
      ctx.beginPath();
      ctx.arc(sx, sy, 28, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,240,100,0.95)';
      ctx.fill();

      // Sandy beach strip
      const beachTop = h - 90;
      const beachGrad = ctx.createLinearGradient(0, beachTop, 0, h);
      beachGrad.addColorStop(0, 'rgba(210,180,120,0.82)');
      beachGrad.addColorStop(1, 'rgba(190,155,90,0.92)');
      ctx.fillStyle = beachGrad;
      ctx.fillRect(0, beachTop, w, 90);

      // Waves — two layers, gentle animation
      [0, 1].forEach(layer => {
        const offset = Math.sin(tick * 0.018 + layer * Math.PI) * 6;
        const waveY  = beachTop - 14 + layer * 8 + offset;
        ctx.beginPath();
        ctx.moveTo(0, waveY);
        for (let x = 0; x <= w; x += 4) {
          const y = waveY + Math.sin((x / w) * Math.PI * 6 + tick * 0.04 + layer * 1.2) * 4;
          ctx.lineTo(x, y);
        }
        ctx.lineTo(w, h); ctx.lineTo(0, h); ctx.closePath();
        ctx.fillStyle = layer === 0
          ? 'rgba(80,180,210,0.22)'
          : 'rgba(100,200,230,0.14)';
        ctx.fill();
      });

      tick++;
      animFrame = requestAnimationFrame(draw);
    }
    draw();
  }

  // ── Public API ────────────────────────────────────────────────────
  window.fxStop   = stopAll;
  window.fxSnow   = startSnow;
  window.fxLights = startLights;
  window.fxSummer = startSummer;

  window.addEventListener('resize', () => {
    if (activeEffect) { resize(); }
  });

  // Load saved effect on page load
  const saved = localStorage.getItem('newton_fx');
  if (saved === 'snow')   startSnow();
  if (saved === 'lights') startLights();
  if (saved === 'summer') startSummer();
})();
</script>
</body>
</html>
