<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Newton – Sign in</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" href="momentum-symbol.png">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    /* ── Login screen override — dark branded style ── */
    #login-screen {
      background: #090546;
      position: relative;
      overflow: hidden;
    }
    #login-watermark {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 120vmin; height: 120vmin;
      opacity: 0.25;
      pointer-events: none;
      z-index: 0;
    }
    .login-logo-white {
      position: fixed;
      bottom: 32px;
      left: 32px;
      height: 36px;
      width: auto;
      opacity: 0.7;
      z-index: 2;
    }
    .login-card {
      position: relative;
      z-index: 2;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 12px;
      padding: 40px 36px;
      box-shadow: none;
      text-align: center;
      width: 360px;
    }
    .login-card h1 {
      color: white;
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .login-card p {
      color: rgba(255,255,255,0.55);
      margin-bottom: 32px;
      font-size: 14px;
    }
    .btn-signin {
      background: rgba(255,255,255,0.15);
      color: white;
      border: 1px solid rgba(255,255,255,0.3);
      padding: 12px 28px;
      border-radius: 6px;
      font-size: 15px;
      cursor: pointer;
      width: 100%;
      font-family: 'Polymath', 'Segoe UI', Arial, sans-serif;
      font-weight: 600;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn-signin:hover {
      background: rgba(255,255,255,0.22);
      border-color: rgba(255,255,255,0.5);
    }
  </style>
</head>
<body>
  <!-- Login screen -->
  <div id="login-screen">
    <img id="login-watermark" src="mg-visual-swirl.png" alt="">
    <img class="login-logo-white" src="momentum-symbol-and-name-global-white.png" alt="Momentum Global">
    <div class="login-card">
      <h1>Newton</h1>
      <p>Sign in with your Momentum Global account to continue.</p>
      <button class="btn-signin" onclick="signIn()">Sign in with Microsoft</button>
    </div>
  </div>
  <!-- App shell (hidden until signed in) -->
  <div id="app-shell">
    <div id="print-header">
      <div>
        <div class="print-header-title" id="print-header-title">Newton</div>
        <div class="print-header-sub" id="print-header-sub">Momentum Global</div>
      </div>
      <img src="momentum-symbol-and-name-global-white.png" alt="Momentum Global">
    </div>
    <div id="sidebar"></div>
    <div id="main-content"></div>
  </div>
  <!-- MSAL.js from Microsoft CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.3/lib/msal-browser.min.js"></script>
  <!-- App scripts — load in dependency order -->
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/analytics.js"></script>
  <script src="js/router.js"></script>
  <script src="js/nav-core.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/forms.js"></script>
  <script src="js/pages.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <script src="js/report-builder.js"></script>
  <script src="js/admin.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
